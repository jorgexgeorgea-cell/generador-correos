<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail Pro - Correo Temporal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col items-center py-10 px-4 text-white">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-xl border border-slate-700">
        <h1 class="text-3xl font-extrabold text-blue-400 mb-6 text-center italic">QuickMail Pro 🚀</h1>
        
        <div class="bg-slate-700 p-6 rounded-xl mb-6 border border-slate-600">
            <label class="block text-xs font-bold text-blue-300 mb-2 uppercase tracking-widest">Personalizar nombre</label>
            <input type="text" id="userInput" placeholder="Ej: mi.empresa o juan.perez" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg outline-none text-white mb-4 focus:ring-2 focus:ring-blue-500">
            
            <label class="block text-xs font-bold text-blue-300 mb-2 uppercase tracking-widest">Seleccionar terminación</label>
            <select id="domainSelect" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg outline-none text-white mb-6">
                <option value="1secmail.com">@1secmail.com</option>
                <option value="1secmail.org">@1secmail.org</option>
                <option value="vmani.com">@vmani.com</option>
                <option value="wwjmp.com">@wwjmp.com</option>
            </select>
            
            <button onclick="crearCorreo()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 transition shadow-lg uppercase">
                Generar Correo Único
            </button>
        </div>

        <div class="bg-slate-900 p-5 rounded-2xl border-2 border-blue-500/50 mb-8">
            <input type="text" id="finalEmail" readonly class="w-full bg-transparent text-xl font-mono text-blue-400 text-center outline-none" value="Crea tu correo arriba">
            <button onclick="copiar()" class="w-full mt-4 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-xs font-bold">COPIAR DIRECCIÓN</button>
        </div>

        <div class="border-t border-slate-700 pt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-200">Bandeja de Entrada</h2>
                <div id="status" class="flex items-center text-[10px] text-green-400 font-bold uppercase">
                    <span class="relative flex h-2 w-2 mr-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    En línea
                </div>
            </div>
            <div id="msgList" class="space-y-3 text-center text-slate-500 text-sm py-10 border-2 border-dashed border-slate-700 rounded-2xl">
                Esperando mensajes... (Se actualiza cada 5 seg)
            </div>
        </div>
    </div>

    <script>
        let mailActivo = "";
        let checker = null;

        function crearCorreo() {
            const rawName = document.getElementById('userInput').value.trim().toLowerCase();
            const dom = document.getElementById('domainSelect').value;
            const num = Math.floor(1000 + Math.random() * 9000); // 4 números únicos
            
            // Si el usuario escribe algo, le sumamos los números. Si no, genera 8 letras random.
            let name = rawName ? rawName.replace(/[^a-z0-9.]/g, '') + num : Math.random().toString(36).substring(2, 10);
            
            mailActivo = `${name}@${dom}`;
            document.getElementById('finalEmail').value = mailActivo;
            document.getElementById('msgList').innerHTML = `<p class="animate-pulse text-blue-400">Escaneando nubes de datos para:<br><b>${mailActivo}</b></p>`;
            
            if(checker) clearInterval(checker);
            checkApi();
