<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickMail - Correos Temporales Gratis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center py-10">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-xl border-t-8 border-blue-500">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">QuickMail ✉️</h1>
        <p class="text-gray-500 text-center mb-8">Usa este correo para registrarte donde quieras y evitar el spam.</p>

        <div class="flex items-center space-x-2 mb-6">
            <input type="text" id="emailAddr" readonly class="w-full p-4 bg-gray-50 border-2 border-dashed border-blue-200 rounded-lg text-lg font-mono text-blue-600 outline-none">
            <button onclick="copyEmail()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-lg font-bold transition">Copiar</button>
        </div>

        <button onclick="genEmail()" class="w-full mb-8 text-blue-600 font-semibold hover:underline">Generar otro correo</button>

        <div class="border-t pt-6">
            <h2 class="text-xl font-bold text-gray-700 mb-4 flex justify-between">
                Bandeja de Entrada 
                <span id="loader" class="text-sm font-normal text-blue-500 hidden animate-pulse">Buscando mensajes...</span>
            </h2>
            <div id="emailsList" class="space-y-3">
                <p class="text-center text-gray-400 py-10">Esperando mensajes entrantes...</p>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = "";
        const domain = "1secmail.com";

        // Generar nombre aleatorio
        function genEmail() {
            const chars = 'abcdefghijklmnopqrstuvwxyz1234567890';
            let name = '';
            for(let i=0; i<8; i++) name += chars[Math.floor(Math.random() * chars.length)];
            currentEmail = name + "@" + domain;
            document.getElementById('emailAddr').value = currentEmail;
            document.getElementById('emailsList').innerHTML = '<p class="text-center text-gray-400 py-10">Bandeja vacía. Los mensajes aparecerán aquí.</p>';
            checkMail();
        }

        function copyEmail() {
            const el = document.getElementById('emailAddr');
            el.select();
            document.execCommand('copy');
            alert("Correo copiado");
        }

        // Revisar si hay correos nuevos cada 5 segundos
        async function checkMail() {
            if(!currentEmail) return;
            const [user, dom] = currentEmail.split('@');
            document.getElementById('loader').classList.remove('hidden');

            try {
                const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${user}&domain=${dom}`);
                const emails = await res.json();
                
                const list = document.getElementById('emailsList');
                if(emails.length > 0) {
                    list.innerHTML = "";
                    emails.forEach(mail => {
                        const item = document.createElement('div');
                        item.className = "p-4 bg-blue-50 rounded-lg border border-blue-100";
                        item.innerHTML = `<strong>De:</strong> ${mail.from}<br><strong>Asunto:</strong> ${mail.subject}`;
                        list.appendChild(item);
                    });
                }
            } catch (e) { console.error(e); }
            
            document.getElementById('loader').classList.add('hidden');
            setTimeout(checkMail, 5000);
        }

        window.onload = genEmail;
    </script>
</body>
</html>
