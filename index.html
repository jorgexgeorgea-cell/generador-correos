<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgOptimizador Pro - Smart Resize</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-slate-200 min-h-screen flex flex-col items-center py-10 px-4 font-sans">

    <div class="w-full max-w-2xl bg-[#161d2f] p-8 rounded-3xl shadow-2xl border border-slate-800">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-500 italic tracking-tighter">SMART OPTIMIZER ⚡</h1>
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-[0.2em] mt-1">Control de Calidad y Redimensionado</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-700 bg-slate-900/50 rounded-2xl p-12 text-center hover:border-blue-500 transition-all cursor-pointer mb-6 group">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <p class="text-lg font-bold group-hover:text-blue-400 transition">📂 Arrastra o selecciona tu imagen</p>
        </div>

        <div id="editor" class="hidden space-y-6">
            
            <div id="upscaleWarning" class="hidden bg-orange-500/10 border border-orange-500/50 p-4 rounded-xl flex items-start gap-3">
                <span class="text-orange-500 text-xl">⚠️</span>
                <div>
                    <p class="text-orange-400 text-xs font-bold uppercase">Aviso de Calidad</p>
                    <p class="text-slate-400 text-[11px]">Estás superando el tamaño original. La imagen podría verse borrosa o pixelada.</p>
                </div>
            </div>

            <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-blue-400 text-[10px] font-black uppercase tracking-widest">📐 Dimensiones Finales</h2>
                    <label class="flex items-center text-[11px] text-slate-500 cursor-pointer">
                        <input type="checkbox" id="mantenerProporcion" checked class="mr-2 accent-blue-500">
                        Bloquear Proporción
                    </label>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <label class="block text-[9px] text-slate-500 uppercase font-bold mb-1 ml-1">Ancho (px)</label>
                        <input type="number" id="anchoInput" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-lg font-mono text-white focus:border-blue-500 outline-none transition">
                    </div>
                    <div class="relative">
                        <label class="block text-[9px] text-slate-500 uppercase font-bold mb-1 ml-1">Alto (px)</label>
                        <input type="number" id="altoInput" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-lg font-mono text-white focus:border-blue-500 outline-none transition">
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-slate-400 text-[10px] font-black uppercase tracking-widest font-mono">Post-Procesado</h2>
                    <label class="flex items-center text-[11px] text-blue-400 font-bold cursor-pointer">
                        <input type="checkbox" id="smartSharpen" class="mr-2 w-4 h-4 accent-blue-500">
                        Nitidez IA (Beta)
                    </label>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="formato" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm outline-none cursor-pointer">
                        <option value="image/webp">Formato WebP</option>
                        <option value="image/jpeg">Formato JPG</option>
                        <option value="image/png">Formato PNG</option>
                    </select>
                    <div class="flex flex-col justify-center">
                        <div class="flex justify-between mb-1">
                            <span class="text-[9px] text-slate-500 font-bold uppercase">Calidad</span>
                            <span id="calidadTag" class="text-[9px] text-blue-400 font-bold">80%</span>
                        </div>
                        <input type="range" id="calidadRange" min="0.1" max="1.0" step="0.05" value="0.8" class="w-full accent-blue-500">
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <div class="flex justify-between text-[10px] font-bold uppercase text-slate-500 px-2 mb-3">
                    <span>Peso Original: <span id="pesoOriginal" class="text-slate-300">-</span></span>
                    <span>Peso Final: <span id="pesoFinal" class="text-blue-400 font-black">-</span></span>
                </div>
                <button onclick="descargar()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-lg uppercase tracking-widest transition-all active:scale-95 shadow-xl shadow-blue-900/20">
                    Exportar Imagen ⬇️
                </button>
                <button onclick="location.reload()" class="w-full text-slate-600 text-[10px] uppercase font-bold mt-4 hover:text-white transition">Subir otra diferente</button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput'), editor = document.getElementById('editor');
        const anchoInput = document.getElementById('anchoInput'), altoInput = document.getElementById('altoInput'), mantener = document.getElementById('mantenerProporcion');
        const upscaleWarning = document.getElementById('upscaleWarning'), smartSharpen = document.getElementById('smartSharpen');
        const pesoOriginal = document.getElementById('pesoOriginal'), pesoFinal = document.getElementById('pesoFinal');
        const calidadRange = document.getElementById('calidadRange'), calidadTag = document.getElementById('calidadTag'), formato = document.getElementById('formato');
        
        let img = new Image(), ratio = 0, originalFile = null, originalW = 0, originalH = 0;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => cargar(e.target.files[0]);

        function cargar(file) {
            if (!file) return;
            originalFile = file;
            pesoOriginal.innerText = (file.size / 1024).toFixed(1) + " KB";
            
            const reader = new FileReader();
            reader.onload = (e) => {
                img.src = e.target.result;
                img.onload = () => {
                    originalW = img.width;
                    originalH = img.height;
                    ratio = originalW / originalH;
                    anchoInput.value = originalW;
                    altoInput.value = originalH;
                    dropZone.classList.add('hidden');
                    editor.classList.remove('hidden');
                    actualizarStats();
                };
            };
            reader.readAsDataURL(file);
        }

        // Lógica de dimensiones y alertas
        function checkUpscale() {
            if (parseInt(anchoInput.value) > originalW || parseInt(altoInput.value) > originalH) {
                upscaleWarning.classList.remove('hidden');
                anchoInput.classList.add('text-orange-400');
                altoInput.classList.add('text-orange-400');
            } else {
                upscaleWarning.classList.add('hidden');
                anchoInput.classList.remove('text-orange-400');
                altoInput.classList.remove('text-orange-400');
            }
        }

        anchoInput.oninput = () => {
            if (mantener.checked) altoInput.value = Math.round(anchoInput.value / ratio);
            checkUpscale();
            actualizarStats();
        };
        altoInput.oninput = () => {
            if (mantener.checked) anchoInput.value = Math.round(altoInput.value * ratio);
            checkUpscale();
            actualizarStats();
        };

        calidadRange.oninput = () => {
            calidadTag.innerText = Math.round(calidadRange.value * 100) + "%";
            actualizarStats();
        };
        formato.onchange = actualizarStats;
        smartSharpen.onchange = actualizarStats;

        function renderCanvas() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = parseInt(anchoInput.value) || 1;
            canvas.height = parseInt(altoInput.value) || 1;

            // Si el usuario activa "Nitidez Inteligente", aplicamos filtros de contraste
            if (smartSharpen.checked) {
                // Filtro sutil para mejorar bordes al agrandar
                ctx.filter = 'contrast(1.08) saturate(1.02) brightness(1.01)';
            }

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            return canvas;
        }

        function actualizarStats() {
            const canvas = renderCanvas();
            canvas.toBlob((blob) => {
                if (blob) pesoFinal.innerText = (blob.size / 1024).toFixed(1) + " KB";
            }, formato.value, parseFloat(calidadRange.value));
        }

        function descargar() {
            const canvas = renderCanvas();
            const link = document.createElement('a');
            link.download = `optimized-image.${formato.value.split('/')[1]}`;
            link.href = canvas.toDataURL(formato.value, parseFloat(calidadRange.value));
            link.click();
        }
    </script>
</body>
</html>
